name: Build Preliminary Report

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Rename PDF
        run: cp main.pdf PreliminaryReport.pdf

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Preliminary Report — latest"
          body: |
            Автоматично зкомпільований звіт.
            Commit: ${{ github.sha }}
            Дата: ${{ github.event.head_commit.timestamp }}
          files: PreliminaryReport.pdf
          make_latest: true